---
layout: default_style
permalink: /contact
published: true
---

<div class="container-fluid-kamn">
  <div class="row">
    <div>
      <iframe width="100%" height="450px" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src="{{ site.google_map }}"></iframe>
      <br />
    </div>
    <div class="container">
      <div class="col-lg-4">
        <h4>Encuéntranos en:</h4>

        <p class="block-author">{{ site.company_name }}</p>
        <p>{{ site.address_line }}</p>
        <p>Teléfono: {{ site.telephone_number }}</p>

        <em class="block-author">Correo electrónico: {{ site.company_email }}</em> <br>
        <br>
      </div>
      <div class="col-lg-8">
        <div class="feedback-form">

          <div id="contact-response"></div>
          
          <!-- Formspree contact form - replace YOUR_FORM_ID with your Formspree form ID -->
          <!-- Create a free form at https://formspree.io/ (50 submissions/month free) -->
          <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" id="contact-form">
            <fieldset>
              <div class="form-group form-group-fullname">
                <label class="control-label" for="fullname">Nombre *</label>
                <input type="text" class="form-control" name="name" id="fullname" placeholder="Introduce tu nombre" required>
              </div>
              <div class="form-group form-group-email">
                <label class="control-label" for="email">Correo Electrónico *</label>
                <input type="email" class="form-control" name="email" id="email" placeholder="Introduce tu correo electrónico" required>
              </div>
              <div class="form-group form-group-message">
                <label class="control-label" for="message">Mensaje *</label>
                <textarea class="form-control" name="message" id="message" rows="3" required></textarea>
              </div>
              <!-- Honeypot field to prevent spam -->
              <input type="text" name="_gotcha" style="display:none">
              <button type="submit" class="btn btn-primary">Enviar</button>
            </fieldset>
          </form>
          
        </div> 
      </div>
    </div>
  </div>
</div>
