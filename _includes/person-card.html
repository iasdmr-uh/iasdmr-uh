<div class="committee-card">
  {% if include.person.photo %}
  <img src="{{ site.baseurl }}/assets/photos-staff/{{ include.person.folder }}/{{ include.person.photo }}"
       class="committee-photo"
       loading="lazy"
       alt="Foto de {{ include.person.name }}"
       onerror="this.onerror=null; this.src='{{ site.baseurl }}/assets/img/placeholder-person.svg';">
  {% else %}
  <div class="committee-placeholder">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <circle cx="50" cy="35" r="20" fill="#BDBDBD"/>
      <path d="M50 60 C25 60 15 80 15 95 L85 95 C85 80 75 60 50 60" fill="#BDBDBD"/>
    </svg>
  </div>
  {% endif %}
  <div class="committee-info">
    <h5 class="committee-name">{{ include.person.name }}</h5>
    <p class="committee-role">{{ include.person.role }}</p>
  </div>
</div>
